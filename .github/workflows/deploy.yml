name: Deploy (node)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Build with Gradle
        run: ./gradlew clean bootJar -x test

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/libs/*.jar artifacts/ 2>/dev/null || true
          # include module-local Dockerfile and docker-compose (assume present in module repo)
          cp Dockerfile artifacts/Dockerfile 2>/dev/null || true
          cp compose.yml artifacts/docker-compose.yml 2>/dev/null || true
          cat > artifacts/.env <<EOF
          RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
          RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
          RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          USER_SERVICE_URL=${{ secrets.USER_SERVICE_URL }}
          GATEWAY_SERVICE_URL=${{ secrets.GATEWAY_SERVICE_URL }}
          NODE_SERVICE_URL=${{ secrets.NODE_SERVICE_URL }}
          NODE_WS_URL=${{ secrets.NODE_WS_URL }}
          ROADMAP_SERVICE_URL=${{ secrets.ROADMAP_SERVICE_URL }}
          EOF

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.6.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Upload artifacts to server
        run: |
          scp -o StrictHostKeyChecking=no -r artifacts/* ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/jagalchi/

      - name: Remote deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' <<'BASH'
            set -e
            REMOTE_DIR=/tmp/jagalchi
            sudo mkdir -p /opt/jagalchi/current
            sudo rm -rf /opt/jagalchi/current/* || true
            sudo mv ${REMOTE_DIR}/* /opt/jagalchi/current/ || true
            cd /opt/jagalchi/current
            if [ -f docker-compose.yml ]; then
              sudo docker compose down || true
              sudo docker compose up -d --build
            else
              echo "docker-compose.yml not found"
              exit 1
            fi
          BASH
